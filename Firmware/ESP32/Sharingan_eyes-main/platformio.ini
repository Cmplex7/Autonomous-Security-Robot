[env:esp32doit-devkit-v1]
platform = espressif32@6.3.2
platform_packages =
    framework-arduinoespressif32@3.20006.221224
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_port = COM9
upload_speed = 460800

lib_deps = bodmer/TFT_eSPI@^2.5.31

build_flags =
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=-1
    -DTFT_DC=22
    -DTFT_RST=4
    -DSPI_FREQUENCY=20000000